name: build and push docker image
run-name: build and push docker image
on:
  release:
    types: [published]
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: prepare tags
        id: prep
        run: |
          IMAGE="dnastack/wdl-ci"
          VERSION_TAG=`git describe --tags --abbrev=0`
          LONG_VERSION_TAG=`git describe --tags --long --always`
          LATEST_TAG="latest"
          ALL_TAGS="${IMAGE}:${VERSION_TAG},${IMAGE}:${LONG_VERSION_TAG},${IMAGE}:${LATEST_TAG}"

          echo "all_tags=${ALL_TAGS}" >> "$GITHUB_OUTPUT"
      - name: set up QEMU
        uses: docker/setup-qemu-action@master
        with:
          platforms: all
      - name: set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@master
      - name: login to dockerhub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: ${{ steps.prep.outputs.all_tags }}
